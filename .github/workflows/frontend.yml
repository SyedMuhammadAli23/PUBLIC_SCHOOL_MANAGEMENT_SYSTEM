name: Deploy Frontend to S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Build and Deploy Frontends
        shell: bash
        run: |

          set -e

          declare -A BUCKETS

          BUCKETS["admin-portal"]="asst-admin-portal-prod"
          BUCKETS["user-portal"]="asst-user-portal-prod"
          BUCKETS["devops-dashboard"]="asst-devops-dashboard-prod"

          APPS=(
            "admin-portal"
            "user-portal"
            "devops-dashboard"
          )

          for APP in "${APPS[@]}"
          do

            echo ""
            echo "=========================================="
            echo "Deploying $APP"
            echo "=========================================="

            cd frontends/$APP

            npm ci

            npm run build

            echo ""
            echo "Contents of dist/"
            ls -R dist

            BUCKET=${BUCKETS[$APP]}

            if [ "$APP" = "admin-portal" ]; then

              echo "Uploading Admin Portal..."

              aws s3 sync dist/ s3://$BUCKET --delete

              aws s3 sync dist/ s3://$BUCKET/admin --delete

            elif [ "$APP" = "user-portal" ]; then

              echo "Uploading User Portal..."

              aws s3 sync dist/ s3://$BUCKET --delete

              aws s3 sync dist/ s3://$BUCKET/user --delete

            else

              echo "Uploading DevOps Dashboard..."

              aws s3 sync dist/ s3://$BUCKET --delete

            fi

            echo ""
            echo "Bucket contents:"
            aws s3 ls s3://$BUCKET --recursive

            cd ../..

          done

      - name: Invalidate CloudFront Cache
        run: |

          aws cloudfront create-invalidation \
            --distribution-id EXEZ7ZTTNYSID \
            --paths "/*"

      - name: Deployment Complete
        run: |
          echo "======================================"
          echo "Frontend deployment completed."
          echo "CloudFront invalidation submitted."
          echo "======================================"