name: Deploy Frontend to S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Detect Changed Frontends
        id: changes
        shell: bash
        run: |
        
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=ALL" >> $GITHUB_OUTPUT
            exit 0
          fi
        
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          else
            echo "No previous commit found."
            echo "changed=ALL" >> $GITHUB_OUTPUT
            exit 0
          fi
        
          FRONTENDS=$(echo "$CHANGED" \
            | grep '^frontends/' \
            | cut -d'/' -f2 \
            | sort -u \
            | tr '\n' ' ')
        
          if [ -z "$FRONTENDS" ]; then
            echo "changed=NONE" >> $GITHUB_OUTPUT
          else
            echo "changed=$FRONTENDS" >> $GITHUB_OUTPUT
          fi

      - name: Build and Upload Changed Frontends
        if: steps.changes.outputs.changed != 'NONE'
        shell: bash
        run: |

          set -e

          declare -A BUCKETS

          BUCKETS["admin-portal"]="asst-admin-portal-prod"
          BUCKETS["user-portal"]="asst-user-portal-prod"
          BUCKETS["devops-dashboard"]="asst-devops-dashboard-prod"

          if [ "${{ steps.changes.outputs.changed }}" = "ALL" ]; then
            APPS="${!BUCKETS[@]}"
          else
            APPS="${{ steps.changes.outputs.changed }}"
          fi

          for APP in $APPS
          do
            echo ""
            echo "=========================================="
            echo "Deploying $APP"
            echo "=========================================="

            cd frontends/$APP

            npm ci
            npm run build

            echo ""
            echo "Contents of dist/"
            ls -R dist

            BUCKET=${BUCKETS[$APP]}

            if [ "$APP" = "admin-portal" ]; then

              echo "Uploading Admin Portal..."
              aws s3 sync dist/ s3://$BUCKET --delete
              aws s3 sync dist/ s3://$BUCKET/admin --delete

            elif [ "$APP" = "user-portal" ]; then

              echo "Uploading User Portal..."
              aws s3 sync dist/ s3://$BUCKET --delete
              aws s3 sync dist/ s3://$BUCKET/user --delete

            else

              echo "Uploading DevOps Dashboard..."
              aws s3 sync dist/ s3://$BUCKET --delete

            fi

            echo ""
            echo "Bucket Contents:"
            aws s3 ls s3://$BUCKET --recursive

            cd ../..

          done

      - name: Invalidate CloudFront Cache
        if: steps.changes.outputs.changed != 'NONE'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id EXEZ7ZTTNYSID \
            --paths "/*"

      - name: No Frontend Changes
        if: steps.changes.outputs.changed == 'NONE'
        run: |
          echo "No frontend changes detected."