name: Deploy Microservices to AWS ECR

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Required permissions for OIDC authentication
permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Microservice Images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # Define array matching your exact ECR repositories and service folders
          # Format: "service_folder_name:ecr_repo_name"
          SERVICES=(
            "gateway-service:psm-gateway-service"
            "academic-service:psm-academic-service"
            "library-service:psm-library-service"
            "inventory-service:psm-inventory-service"
            "scheduling-service:psm-scheduling-service"
            "finance-service:psm-finance-service"
            "cafe-service:psm-cafe-service"
            "assignment-quiz-service:psm-assignment-quiz-service"
            "research-lab-service:psm-research-lab-service"
            "parking-alumni-service:psm-parking-alumni-service"
            "report-service:psm-report-service"
          )

          for item in "${SERVICES[@]}"; do
            # Split the string by the colon
            FOLDER="${item%%:*}"
            REPO="${item##*:}"

            echo "----------------------------------------"
            echo "Processing Service: $FOLDER -> Repository: $REPO"
            echo "----------------------------------------"

            # Build the Docker image using the context of its specific directory
            docker build \
              -t $ECR_REGISTRY/$REPO:latest \
              -t $ECR_REGISTRY/$REPO:${{ github.sha }} \
              -f ./services/$FOLDER/Dockerfile ./services/$FOLDER

            # Push both 'latest' and the unique commit SHA tag to AWS ECR
            docker push $ECR_REGISTRY/$REPO:latest
            docker push $ECR_REGISTRY/$REPO:${{ github.sha }}
          done
